# =============================================================================
# /etc/pf.conf — macOS System PF Configuration
# =============================================================================
# This is the main PF config file. Do NOT replace it entirely.
# Our custom firewall rules are loaded via the "custom" anchor below.
# Custom rules run FIRST, before Apple system filters.
# =============================================================================

# =============================================================================
# (1) GLOBAL OPTIONS
# =============================================================================

# Enforce strict rule ordering: options → normalization → queueing →
# translation → filtering. Prevents rule misplacement errors.
set require-order yes

# Default action for blocked packets: drop (silent) instead of reject (sends
# TCP RST or ICMP unreachable). Drop is more secure — reveals less to attackers.
set block-policy drop

# PF optimization profile for a typical desktop/laptop workstation
# Other options: high-latency, aggressive, conservative
set optimization normal

# Maximum number of simultaneous tracked connections (states)
# Increased from default ~10000 to handle modern browsing workloads
set limit states 150000

# Maximum number of packet fragments held in memory for reassembly
# Prevents memory exhaustion from fragmentation-based attacks
set limit frags  50000

# Bind each state to the interface it was created on
# Prevents state from being used on a different interface — important for
# kill-switch: a state created on utun* cannot leak through en0
set state-policy if-bound

# =============================================================================
# (2) NORMALIZATION
# =============================================================================

# Normalize all incoming packets:
# no-df    — clear "Don't Fragment" bit, prevents DF-based OS fingerprinting
# random-id — randomize IP ID field, prevents OS fingerprinting via IP ID sequences
scrub in all no-df random-id

# =============================================================================
# (3) QUEUEING
# =============================================================================

# Empty — ALTQ traffic shaping is not used in this configuration
# ALTQ is disabled in macOS kernel by default (confirmed by "No ALTQ support" message)

# =============================================================================
# (4) TRANSLATION (NAT / RDR / DUMMYNET)
# =============================================================================

# Apple system anchors for NAT, port redirection, and traffic shaping.
# IMPORTANT: Only NAT, rdr, and dummynet rules belong here — no packet filters.
# These anchors are managed by macOS system services (Internet Sharing, etc.)
scrub-anchor    "com.apple/*"
nat-anchor      "com.apple/*"
rdr-anchor      "com.apple/*"
dummynet-anchor "com.apple/*"

# =============================================================================
# (5) FILTERING
# =============================================================================

# --- Custom anchor — MUST be first among all filter rules ---
# Loads our hardened ruleset from /etc/pf.anchors/custom
# Execution order: custom rules run before Apple filters, ensuring
# kill-switch and DNS isolation cannot be bypassed by system rules
anchor "custom"
load anchor "custom" from "/etc/pf.anchors/custom"

# --- Apple system filters — loaded after custom anchor ---
# Handles macOS system services: AirDrop, Internet Sharing, VPN clients, etc.
# Runs after our rules — our security policy takes priority
anchor "com.apple/*"
load anchor "com.apple" from "/etc/pf.anchors/com.apple"
